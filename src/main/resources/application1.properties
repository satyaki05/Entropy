# This is safe for GitHub - no real secrets here!
spring.application.name=backend-learning

# Use placeholders ${} - Render will plug these in

app.encryption.secret-key=${APP_ENCRYPTION_SECRET_KEY:fallback_encryption_key_54321}

# DATABASE - Points to your Render Env Vars
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA & Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT - Points to Render Env Var
spring.security.jwt.secret-key=${SPRING_SECURITY_JWT_SECRET_KEY:temporary_key_to_prevent_crash_12345}
spring.security.jwt.expiration=86400000

# SERVER
server.port=8080